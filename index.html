<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Acceso Privado</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050816;
  color:white;
  font-family:Arial, Helvetica, sans-serif;
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:430px;
  background:#0b1020;
  border-radius:30px;
  overflow:hidden;
  box-shadow:0 0 30px rgba(0,0,0,.5);
}

#leadForm{
  padding:30px 25px;
}

h1{
  text-align:center;
  margin-bottom:15px;
  font-size:32px;
}

p{
  text-align:center;
  color:#d7d7d7;
  line-height:1.5;
  margin-bottom:25px;
}

input,
select{
  width:100%;
  padding:18px;
  margin-bottom:18px;
  border:none;
  border-radius:18px;
  font-size:18px;
}

label{
  display:block;
  margin-bottom:12px;
  font-size:18px;
}

.checks{
  margin-bottom:20px;
}

.checks label{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
  font-size:20px;
}

.checks input{
  width:auto;
  transform:scale(1.3);
}

button{
  width:100%;
  background:#00d84a;
  color:white;
  border:none;
  padding:20px;
  border-radius:18px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}

.small{
  font-size:14px;
  color:#bdbdbd;
  margin-top:20px;
}

#videoSection{
  display:none;
  padding:20px;
}

video{
  width:100%;
  border-radius:20px;
}

.videoControls{
  margin-top:15px;
  display:flex;
  justify-content:center;
}

.controlBtn{
  background:#00d84a;
  color:white;
  border:none;
  padding:14px 20px;
  border-radius:14px;
  font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<!-- FORMULARIO -->

<div id="leadForm">

<h1>Acceso Privado</h1>

<p>
Esta presentación está diseñada para personas
que buscan crecimiento, bienestar y nuevas oportunidades.
</p>

<input
type="text"
id="nombre"
placeholder="Tu nombre">

<input
type="tel"
id="telefono"
placeholder="Tu WhatsApp">

<select id="interes">

<option value="">
¿Qué te interesa más?
</option>

<option>
Ganar dinero extra
</option>

<option>
Ahorrar en productos
</option>

<option>
Crear un negocio
</option>

<option>
Mejorar mi salud
</option>

<option>
Tener más tiempo
</option>

</select>

<label style="
display:block;
margin-top:15px;
margin-bottom:10px;
text-align:left;
font-weight:bold;
">

¿Qué plataformas has usado?
(máximo 3)

</label>

<div class="checks">

<label>
<input type="checkbox" value="Amazon">
Amazon
</label>

<label>
<input type="checkbox" value="Mercado Libre">
Mercado Libre
</label>

<label>
<input type="checkbox" value="Shein">
Shein
</label>

<label>
<input type="checkbox" value="Temu">
Temu
</label>

</div>

<select id="comprasInternet">

<option value="">
¿Has hecho compras por internet tipo:
Amazon, Mercado Libre, Shein, Temu, etc.?
</option>

<option>
SI
</option>

<option>
NO
</option>

</select>

<select id="tipoCompra">

<option value="">
¿Dónde compras normalmente?
</option>

<option>
Costco / Sam’s
</option>

<option>
Soriana / Aurrera
</option>

<option>
3B / Neto
</option>

</select>

<button id="leadBtn" onclick="guardarLead()">

QUIERO VER LA PRESENTACIÓN

</button>

<p class="small">

Tus datos nos ayudan a darte seguimiento personalizado.

</p>

</div>

<!-- VIDEO -->

<div id="videoSection">

<video
id="miVideo"
playsinline
webkit-playsinline
controls
controlsList="nodownload">

<source
src="TUVIDEO.mp4"
type="video/mp4">

</video>

<div class="videoControls">

<button
class="controlBtn"
onclick="fullscreenVideo()">

Pantalla completa

</button>

</div>

</div>

</div>

<script>

async function guardarLead(){

  const nombre =
  document.getElementById("nombre").value;

  const telefono =
  document.getElementById("telefono").value;

  const interes =
  document.getElementById("interes").value;

  const comprasInternet =
  document.getElementById("comprasInternet").value;

  const tipoCompra =
  document.getElementById("tipoCompra").value;

  const plataformas = [];

  document
  .querySelectorAll('.checks input:checked')
  .forEach(el => {

    plataformas.push(el.value);

  });

  if(
    !nombre ||
    !telefono ||
    !interes ||
    !comprasInternet ||
    !tipoCompra
  ){

    alert("Completa todos los campos");

    return;

  }

  if(plataformas.length > 3){

    alert("Máximo 3 plataformas");

    return;

  }

  const data = {

    nombre: nombre,

    telefono: telefono,

    intereses: interes,

    plataformas: plataformas.join(", "),

    comprasInternet: comprasInternet,

    tipoCompra: tipoCompra

  };

  try{

    await fetch(

      "PEGA_AQUI_TU_URL_DE_APPS_SCRIPT",

      {

        method:"POST",

        body:JSON.stringify(data)

      }

    );

  }catch(error){

    console.log(error);

  }

  document
  .getElementById("leadForm")
  .style.display = "none";

  document
  .getElementById("videoSection")
  .style.display = "block";

  const video =
  document.getElementById("miVideo");

  video.play();

}

function fullscreenVideo(){

  const video =
  document.getElementById("miVideo");

  if(video.requestFullscreen){

    video.requestFullscreen();

  }else if(video.webkitEnterFullscreen){

    video.webkitEnterFullscreen();

  }

}

</script>

</body>
</html>
