<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Privado</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#02091f;color:white;font-family:Arial,Helvetica,sans-serif;display:flex;justify-content:center;padding:20px}
.container{width:100%;max-width:430px;background:#080e22;padding:30px;border-radius:24px}
h1{text-align:center;font-size:34px;margin-bottom:20px}
p{text-align:center;color:#d9d9d9;line-height:1.5;margin-bottom:28px}
input,select{width:100%;padding:18px;margin-bottom:20px;border:none;border-radius:18px;font-size:18px}
button{width:100%;padding:20px;background:#59dc57;color:white;border:none;border-radius:18px;font-size:20px;font-weight:bold;cursor:pointer}
.small{font-size:14px;color:#bdbdbd;margin-top:18px}
.video-container{display:none;margin-top:28px}
.video-wrapper{position:relative;width:100%;padding-bottom:56.25%;border-radius:18px;overflow:hidden}
.video-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
</style>
</head>

<body>

<div class="container">

<h1>Acceso Privado</h1>

<p>
Esta presentación está diseñada para personas que buscan crecimiento, bienestar y nuevas oportunidades.
</p>

<input type="text" id="nombre" placeholder="Tu nombre">

<input type="tel" id="telefono" placeholder="Tu WhatsApp">

<select id="interes">
<option value="">¿Qué te interesa más?</option>
<option>Ganar dinero extra</option>
<option>Ahorrar en productos</option>
<option>Crear un negocio</option>
<option>Mejorar mi salud</option>
<option>Tener más tiempo</option>
</select>

<select id="comprasInternet">
<option value="">¿Has hecho compras por internet tipo Amazon, Mercado Libre, Shein, Temu, etc.?</option>
<option>Sí</option>
<option>No</option>
</select>

<select id="tipoCompra">
<option value="">¿Dónde compras normalmente?</option>
<option>Costco / Sam’s</option>
<option>Soriana / Aurrera</option>
<option>3B / Neto</option>
</select>

<button id="leadBtn" onclick="guardarLead()">
QUIERO VER LA PRESENTACIÓN
</button>

<p class="small">
Tus datos nos ayudan a darte seguimiento personalizado.
</p>

<div class="video-container" id="videoSection">
  <div class="video-wrapper">
    <iframe
      src="https://www.youtube.com/embed/3jbsmMXGDlg?autoplay=1&controls=0&rel=0&modestbranding=1"
      title="Video"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>
</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyVNdbsglyetIuDzJnRPhYbeJS3rczb4RIBX70d56MUQE4A8WW0UUaV9nzRFPAIjP6_Dw/exec";

async function guardarLead(){

  const nombre = document.getElementById("nombre").value.trim();
  const telefono = document.getElementById("telefono").value.trim();
  const interes = document.getElementById("interes").value;
  const comprasInternet = document.getElementById("comprasInternet").value;
  const tipoCompra = document.getElementById("tipoCompra").value;
  const leadBtn = document.getElementById("leadBtn");

  if(!nombre || !telefono || !interes || !comprasInternet || !tipoCompra){
    alert("Completa todos los campos");
    return;
  }

  leadBtn.textContent = "CARGANDO...";
  leadBtn.disabled = true;

  await fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      nombre:nombre,
      telefono:telefono,
      interes:interes,
      comprasInternet:comprasInternet,
      tipoCompra:tipoCompra
    })
  });

  document.getElementById("videoSection").style.display="block";
  leadBtn.style.display="none";
}
</script>

</body>
</html>
