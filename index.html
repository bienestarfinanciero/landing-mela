<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acceso Privado</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#02091f;
color:white;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:430px;
}

h1{
text-align:center;
font-size:42px;
margin-top:20px;
margin-bottom:20px;
}

.description{
text-align:center;
font-size:18px;
line-height:1.6;
color:#d9d9d9;
margin-bottom:35px;
}

input,
select{
width:100%;
padding:24px;
margin-bottom:25px;
border:none;
border-radius:28px;
font-size:20px;
outline:none;
}

button{
width:100%;
padding:24px;
background:#59dc57;
color:white;
border:none;
border-radius:28px;
font-size:22px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:hover{
opacity:.9;
}

.small{
margin-top:20px;
font-size:15px;
text-align:center;
color:#bdbdbd;
line-height:1.5;
}

.video-container{
display:none;
margin-top:35px;
}

.video-wrapper{
position:relative;
width:100%;
padding-bottom:56.25%;
overflow:hidden;
border-radius:22px;
}

.video-wrapper iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Acceso Privado</h1>

<p class="description">
Esta presentación está diseñada para personas que buscan crecimiento, bienestar y nuevas oportunidades.
</p>

<input
type="text"
id="nombre"
placeholder="Tu nombre">

<input
type="tel"
id="telefono"
placeholder="Tu WhatsApp">

<select id="interes">
<option value="">¿Qué te interesa más?</option>
<option>Ganar dinero extra</option>
<option>Ahorrar en productos</option>
<option>Crear un negocio</option>
<option>Mejorar mi salud</option>
<option>Tener más tiempo</option>
</select>

<select id="comprasInternet">
<option value="">¿Has hecho compras por internet tipo Amazon, Mercado Libre, Shein, Temu, etc.?</option>
<option>Sí</option>
<option>No</option>
</select>

<select id="tipoCompra">
<option value="">¿Dónde compras normalmente?</option>
<option>Costco / Sam’s</option>
<option>Soriana / Aurrera</option>
<option>3B / Neto</option>
</select>

<button onclick="guardarLead()">
QUIERO VER LA PRESENTACIÓN
</button>

<p class="small">
Tus datos nos ayudan a darte seguimiento personalizado.
</p>

<div class="video-container" id="videoSection">

<div class="video-wrapper">

<iframe
src="https://www.youtube.com/embed/3jbsmMXGDlg?autoplay=1&controls=0&rel=0&modestbranding=1"
title="Video"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

</div>

</div>

</div>

<script>

async function guardarLead(){

const nombre = document.getElementById("nombre").value;
const telefono = document.getElementById("telefono").value;
const interes = document.getElementById("interes").value;
const comprasInternet = document.getElementById("comprasInternet").value;
const tipoCompra = document.getElementById("tipoCompra").value;

if(!nombre || !telefono){
alert("Completa tus datos");
return;
}

await fetch("PEGA_AQUI_TU_WEBAPP_URL",{

method:"POST",

body:JSON.stringify({
nombre,
telefono,
interes,
comprasInternet,
tipoCompra
})

});

document.getElementById("videoSection").style.display="block";

}

</script>

</body>
</html>
